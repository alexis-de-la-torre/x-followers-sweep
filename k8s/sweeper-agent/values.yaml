replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/adlt-s26/adlt-s26-repo/sweeper-agent
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  name: sweeper-agent
  gcpServiceAccount: ""

service:
  type: ClusterIP
  port: 8080

# Chrome is heavy — needs at least 1GB RAM for headless rendering + VNC
resources:
  limits:
    memory: 512Mi
    cpu: "0.5"
  requests:
    memory: 256Mi
    cpu: "0.1"

# No Chrome profile needed — connects to chrome-vnc service

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 15

# Env vars injected via ConfigMap (set per-environment in skaffold profiles)
env: {}