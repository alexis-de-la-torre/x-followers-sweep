apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sweeper-agent.fullname" . }}
  labels:
    {{- include "sweeper-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sweeper-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sweeper-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sweeper-agent.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "sweeper-agent.fullname" . }}-config
            - secretRef:
                name: sweeper-agent-env
          ports:
            - name: http
              containerPort: 8020
              protocol: TCP
          volumeMounts:
            - name: chrome-profile
              mountPath: /chrome-profile
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: chrome-profile
          persistentVolumeClaim:
            claimName: {{ include "sweeper-agent.fullname" . }}-pvc