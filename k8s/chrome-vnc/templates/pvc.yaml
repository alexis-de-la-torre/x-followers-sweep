apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chrome-vnc.fullname" . }}-pvc
  labels:
    {{- include "chrome-vnc.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.chromeProfile.storageSize | default "2Gi" }}